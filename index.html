<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Street Hustle: Lagos Life</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="game">
    <h1>💰 Street Hustle: Lagos Life</h1>

    <div class="stats">
      <p>Money: ₦<span id="money">0</span></p>
      <p>Level: <span id="level">Street Seller</span></p>
      <p>Reputation: <span id="rep">1</span></p>
    </div>

    <div class="buttons">
      <button onclick="sell()">Sell Jewelry 💎</button>
      <button onclick="ride()">Ride Hailing 🚗</button>
      <button onclick="influence()">Post on Instagram 📱</button>
    </div>

    <div class="upgrades">
      <button onclick="upgrade()">Upgrade Business 🚀 (₦200)</button>
    </div>

    <p id="event"></p>
  </div>

  <script src="script.js"></script>
</body>
</html>
