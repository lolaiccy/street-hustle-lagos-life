<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Street Hustle: Lagos Life</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background-color: #111;
      color: #fff;
    }

    h1 {
      color: gold;
    }

    button {
      padding: 15px 25px;
      font-size: 18px;
      margin: 10px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    .sell {
      background-color: green;
      color: white;
    }

    .upgrade {
      background-color: orange;
      color: black;
    }
  </style>
</head>
<body>

  <h1>💰 Street Hustle: Lagos Life</h1>
  <p>Money: ₦<span id="money">0</span></p>
  <p>Level: <span id="level">Street Seller</span></p>

  <button class="sell" onclick="sell()">Sell Jewelry 💎</button>
  <button class="upgrade" onclick="upgrade()">Upgrade Business 🚀</button>

  <script>
    let money = 0;
    let earnings = 10;
    let level = 1;

    function sell() {
      money += earnings;
      updateDisplay();
    }

    function upgrade() {
      if (money >= 100) {
        money -= 100;
        earnings += 10;
        level++;

        updateLevel();
        updateDisplay();
      } else {
        alert("You need ₦100 to upgrade!");
      }
    }

    function updateDisplay() {
      document.getElementById("money").innerText = money;
    }

    function updateLevel() {
      let levelText = "Street Seller";

      if (level === 2) levelText = "Market Boss";
      if (level === 3) levelText = "Shop Owner";
      if (level >= 4) levelText = "CEO 💼";

      document.getElementById("level").innerText = levelText;
    }
  </script>

</body>
</html>
